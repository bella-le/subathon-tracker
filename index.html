<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subathon Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --bg2: #18181b;
      --bg3: #1f1f23;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #efeff1;
      --text2: #adadb8;
      --text3: #6b6b7b;
      --purple: #9147ff;
      --purple-dim: rgba(145,71,255,0.15);
      --green: #3ba55c;
      --amber: #f0aa23;
      --amber-dim: rgba(240,170,35,0.12);
      --blue: #5aa7d4;
      --blue-dim: rgba(90,167,212,0.12);
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 560px; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--purple);
    }
    .logo-text { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }

    .error-msg {
      font-size: 12px;
      color: #f87171;
      background: rgba(248,113,113,0.08);
      border: 0.5px solid rgba(248,113,113,0.2);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: none;
      margin-bottom: 12px;
    }

    /* ── Dashboard ─────────────────────────────────────── */
    #dashboard { display: flex; flex-direction: column; gap: 16px; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .channel-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .since-label { font-size: 12px; color: var(--text3); margin-top: 3px; }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text2);
      background: var(--bg3);
      border-radius: 999px;
      padding: 5px 12px;
      border: 0.5px solid var(--border);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #f87171; }
    .dot.live { background: var(--green); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .stat-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
    .stat-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .feed {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      max-height: 380px;
      overflow-y: auto;
    }
    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .feed-empty {
      padding: 40px;
      text-align: center;
      font-size: 13px;
      color: var(--text3);
    }

    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 16px;
      border-bottom: 0.5px solid var(--border);
      animation: slideIn 0.22s ease;
    }
    .feed-item:last-child { border-bottom: none; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

    .event-icon {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; margin-top: 1px;
      font-weight: 700;
    }
    .icon-sub { background: var(--purple-dim); color: var(--purple); }
    .icon-bits { background: var(--amber-dim); color: var(--amber); }
    .icon-gift { background: rgba(59,165,92,0.15); color: var(--green); }
    .icon-tip { background: var(--blue-dim); color: var(--blue); }

    .event-body { flex: 1; min-width: 0; }
    .event-user { font-size: 13px; font-weight: 600; color: var(--text); }
    .event-meta { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
    .event-time { font-size: 11px; color: var(--text3); flex-shrink: 0; white-space: nowrap; padding-top: 2px; }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      margin-left: 7px;
      vertical-align: middle;
      letter-spacing: 0.02em;
    }
    .badge-sub { background: var(--purple-dim); color: var(--purple); }
    .badge-bits { background: var(--amber-dim); color: var(--amber); }
    .badge-gift { background: rgba(59,165,92,0.15); color: var(--green); }
    .badge-tip { background: var(--blue-dim); color: var(--blue); }

    /* ── Timer ─────────────────────────────────────────── */
    .timer-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      text-align: center;
    }
    .timer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .timer-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .twitch-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text3);
      background: var(--bg3);
      border-radius: 999px;
      padding: 4px 10px;
      border: 0.5px solid var(--border);
    }
    .timer-display {
      font-size: 60px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      transition: color 0.3s, opacity 0.3s;
    }
    .timer-display.paused { opacity: 0.35; }
    .timer-display.expired { color: #f87171; }
    @keyframes timerAdd { 0%,100% { color: var(--text); } 20% { color: var(--green); } }
    .timer-display.added { animation: timerAdd 1s ease; }

    #last-poll { font-size: 11px; color: var(--text3); }
  </style>
</head>
<body>
<div class="container">

  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">Subathon Tracker</span>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="dash-header">
      <div>
        <div class="channel-name" id="dash-channel"></div>
      </div>
      <div class="status-pill">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Connecting…</span>
      </div>
    </div>

    <div class="timer-card">
      <div class="timer-header">
        <div class="timer-label">Time Remaining</div>
        <div class="twitch-pill">
          <div class="dot" id="twitch-dot"></div>
          <span id="twitch-status">Checking…</span>
        </div>
      </div>
      <div class="timer-display paused" id="timer-display">--:--:--</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Subs</div>
        <div class="stat-value" id="stat-subs">0</div>
        <div class="stat-sub" id="stat-gift">0 gifted</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Bits</div>
        <div class="stat-value" id="stat-bits">0</div>
        <div class="stat-sub" id="stat-cheerers">0 cheerers</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Events</div>
        <div class="stat-value" id="stat-events">0</div>
        <div class="stat-sub" id="stat-last">—</div>
      </div>
    </div>

    <div class="section-label">Live Feed</div>
    <div class="feed" id="feed">
      <div class="feed-empty">Waiting for events…</div>
    </div>

    <div id="last-poll">Connecting…</div>
  </div>

</div>
<script>
let totalSubs = 0, totalGifted = 0, totalBits = 0, totalEvents = 0;
let cheerers = new Set();

let timerRemaining = 0;
let timerInterval = null;
let timerCfg = { t1: 0, t2: 0, t3: 0, per100Bits: 0, perDollar: 0 };

function fmtTimer(secs) {
  secs = Math.max(0, Math.floor(secs));
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  el.textContent = fmtTimer(timerRemaining);
  el.classList.toggle('expired', timerRemaining <= 0);
}

function addTime(seconds) {
  if (seconds <= 0) return;
  timerRemaining += seconds;
  const el = document.getElementById('timer-display');
  el.classList.remove('added');
  void el.offsetWidth;
  el.classList.add('added');
  updateTimerDisplay();
}

function startTimerTick() {
  if (timerInterval) return; // already running
  timerInterval = setInterval(() => {
    if (timerRemaining > 0) {
      timerRemaining -= 1;
      updateTimerDisplay();
    }
  }, 1000);
  document.getElementById('timer-display').classList.remove('paused');
}

function pauseTimerTick() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-display').classList.add('paused');
}

let liveStatusInterval = null;

async function pollLiveStatus() {
  try {
    const res = await fetch('/api/live-status');
    const { live, configured, seConnected } = await res.json();

    const dot = document.getElementById('twitch-dot');
    const text = document.getElementById('twitch-status');
    dot.classList.toggle('live', live);
    text.textContent = !configured ? 'Timer Running' : live ? 'Stream Live' : 'Offline';

    document.getElementById('status-dot').classList.toggle('live', seConnected);
    document.getElementById('status-text').textContent = seConnected ? 'SE Connected' : 'SE Disconnected';

    if (live) startTimerTick();
    else pauseTimerTick();
  } catch (_) {}
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function fmt(d) {
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function relTime(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  return `${Math.floor(diff / 3600)}h ago`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addFeedItem({ iconText, iconClass, badgeClass, badgeText, user, meta, time }) {
  const feed = document.getElementById('feed');
  const empty = feed.querySelector('.feed-empty');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'feed-item';
  item.innerHTML = `
    <div class="event-icon ${iconClass}">${iconText}</div>
    <div class="event-body">
      <div class="event-user">${escHtml(user)}<span class="badge ${badgeClass}">${badgeText}</span></div>
      <div class="event-meta">${escHtml(meta)}</div>
    </div>
    <div class="event-time">${relTime(time)}</div>
  `;
  feed.insertBefore(item, feed.firstChild);
  if (feed.children.length > 60) feed.removeChild(feed.lastChild);

  totalEvents++;
  document.getElementById('stat-events').textContent = totalEvents;
  document.getElementById('stat-last').textContent = 'Last: ' + fmt(new Date(time));
}

function updateStats() {
  document.getElementById('stat-subs').textContent = totalSubs;
  document.getElementById('stat-gift').textContent = totalGifted + ' gifted';
  document.getElementById('stat-bits').textContent = totalBits.toLocaleString();
  document.getElementById('stat-cheerers').textContent = cheerers.size + ' cheerers';
}

function handleSSEEvent(ev) {
  const { type, user, target, tier, gifted, amount, ts } = ev;

  if (type === 'subscriber') {
    totalSubs++;
    if (gifted) totalGifted++;
    const tierLabel = `Tier ${tier}`;
    addTime([0, timerCfg.t1, timerCfg.t2, timerCfg.t3][tier] || timerCfg.t1);
    addFeedItem({
      iconText: '★',
      iconClass: gifted ? 'icon-gift' : 'icon-sub',
      badgeClass: gifted ? 'badge-gift' : 'badge-sub',
      badgeText: gifted ? 'Gifted' : tierLabel,
      user,
      meta: gifted ? `Gifted a sub to ${target}` : `Subscribed · ${tierLabel}`,
      time: ts,
    });
  } else if (type === 'cheer') {
    totalBits += amount;
    cheerers.add(user.toLowerCase());
    addTime(Math.floor(amount / 100) * timerCfg.per100Bits);
    addFeedItem({
      iconText: '♦',
      iconClass: 'icon-bits',
      badgeClass: 'badge-bits',
      badgeText: 'Bits',
      user,
      meta: `Cheered ${amount.toLocaleString()} bits`,
      time: ts,
    });
  } else if (type === 'tip') {
    addTime(Math.floor(amount) * timerCfg.perDollar);
    addFeedItem({
      iconText: '$',
      iconClass: 'icon-tip',
      badgeClass: 'badge-tip',
      badgeText: 'Donation',
      user,
      meta: `Donated $${Number(amount).toFixed(2)}`,
      time: ts,
    });
  } else {
    return;
  }

  totalEvents++;
  updateStats();
}

async function init() {
  let cfg, state;
  try {
    const [cfgRes, stateRes] = await Promise.all([fetch('/api/config'), fetch('/api/state')]);
    cfg = await cfgRes.json();
    state = await stateRes.json();
  } catch (e) {
    showError('Failed to load config from server.');
    return;
  }

  if (!cfg.channel) {
    showError('SE_CHANNEL must be set in .env before starting.');
    return;
  }

  totalSubs = state.subs || 0;
  totalBits = state.bits || 0;
  totalGifted = state.gifted || 0;
  totalEvents = state.events || 0;

  timerCfg = {
    t1: cfg.secsT1, t2: cfg.secsT2, t3: cfg.secsT3,
    per100Bits: cfg.secsPer100Bits, perDollar: cfg.secsPerDollar,
  };
  timerRemaining = state.timerRemaining ?? cfg.timerStart;

  document.getElementById('dash-channel').textContent = '#' + cfg.channel.toLowerCase();
  updateStats();
  updateTimerDisplay();

  // Resync stats + timer from server every 5s
  setInterval(async () => {
    try {
      const s = await (await fetch('/api/state')).json();
      totalSubs = s.subs || 0;
      totalBits = s.bits || 0;
      totalGifted = s.gifted || 0;
      timerRemaining = s.timerRemaining ?? timerRemaining;
      updateStats();
      updateTimerDisplay();
    } catch (_) {}
  }, 5000);

  // Receive live events from server via SSE
  const es = new EventSource('/api/stream');
  es.onmessage = (e) => handleSSEEvent(JSON.parse(e.data));

  pollLiveStatus();
  if (liveStatusInterval) clearInterval(liveStatusInterval);
  liveStatusInterval = setInterval(pollLiveStatus, 60_000);
}

init();
</script>
</body>
</html>
